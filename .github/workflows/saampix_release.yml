name: SaamPix Firmware Release

on:
  push:
    tags:
      - 'saampix-fw-*'

permissions:
  contents: write

jobs:
  build_saampix:
    name: Build SaamPix Firmware
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install PX4 dependencies
        run: |
          ./Tools/setup/ubuntu.sh --no-nuttx

      - name: Build SaamPix target
        run: |
          make saam_saampixv1_1_default

      - name: Collect firmware artifact
        run: |
          mkdir -p release_artifacts
          cp build/saam_saampixv1_1_default/*.px4 release_artifacts/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: saampix-firmware
          path: release_artifacts/*.px4

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          files: |
            release_artifacts/*.px4
